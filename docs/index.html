<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>わたしについて · ME</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Caveat:wght@400;700&family=Gochi+Hand&family=Bebas+Neue&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<!-- 下雨效果（播放时显示，雨丝由 script.js 生成） -->
<div class="rain" id="rain" aria-hidden="true"></div>

<!-- ===================== 首页 / HERO ===================== -->
<section class="page hero">

  <!-- 背景涂鸦碎片 -->
  <span class="doodle d1">★</span>
  <span class="doodle d2">~</span>
  <span class="doodle d3">✦</span>
  <span class="doodle d4">↯</span>
  <span class="scribble s1"></span>
  <span class="scribble s2"></span>
  <span class="tape tp1"></span>
  <span class="tape tp2"></span>

  <!-- 左半：大标题自我介绍 -->
  <div class="hero-left">
    <p class="kicker" style="--rot:-4deg">こんにちは</p>
    <h1 class="big-title">
      <span class="line l1" style="--rot:-3deg">LIFE WAS</span>
      <span class="line l2" style="--rot:2deg">LIKE A</span>
      <span class="line l3 outline" style="--rot:-2deg">BOX OF</span>
      <span class="line l4" style="--rot:3deg">CHOCOLATES</span>
    </h1>

    <div class="intro-blurb" style="--rot:-2deg">
      <p class="quote-en">You never know what you're going to get.</p>
      <p>ロックと映画が好きで、ちょっとおしゃべりな普通の人です。</p>
      <p class="hand">右のボタンを押すと音楽が再生されます。</p>
    </div>

    <div class="sticker stk1" style="--rot:6deg">魂のリスナー</div>
    <div class="sticker stk2" style="--rot:-8deg">ボリューム上げて</div>
  </div>

  <!-- 右半：黑胶播放器 -->
  <div class="hero-right">
    <div class="player">

      <!-- 唱臂 -->
      <div class="tonearm" id="tonearm">
        <span class="tonearm-pivot"></span>
        <span class="tonearm-bar"></span>
        <span class="tonearm-head"></span>
      </div>

      <!-- 黑胶盘 -->
      <div class="turntable">
        <div class="vinyl" id="vinyl">
          <div class="vinyl-grooves"></div>
          <div class="vinyl-label">
            <!-- 专辑封面放这里：assets/img/cover1.jpg 等 -->
            <img id="cover" src="assets/img/cover1.jpg" alt="album cover"
                 onerror="this.style.display='none'" />
            <span class="vinyl-hole"></span>
          </div>
        </div>
      </div>

      <!-- 歌曲信息 -->
      <div class="track-meta">
        <div class="track-title">
          <span id="trackTitle">November Rain</span>
        </div>
        <div class="track-artist" id="trackArtist">Guns N' Roses</div>
      </div>

      <!-- 进度条 -->
      <div class="progress-row">
        <span class="time" id="curTime">00:00</span>
        <div class="progress" id="progress">
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-knob" id="progressKnob"></div>
        </div>
        <span class="time" id="durTime">00:00</span>
      </div>

      <!-- 控制区 -->
      <div class="controls">
        <button class="ctrl" id="prevBtn" title="前の曲">⏮</button>
        <button class="ctrl play" id="playBtn" title="再生／一時停止">▶</button>
        <button class="ctrl" id="nextBtn" title="次の曲">⏭</button>

        <div class="volume">
          <span class="vol-ico">🔊</span>
          <input type="range" id="volume" min="0" max="100" value="80" />
        </div>
      </div>

      <audio id="audio" preload="metadata"></audio>
    </div>
  </div>

</section>

<script src="script.js"></script>
</body>
</html>
